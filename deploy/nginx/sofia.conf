# nginx como puerta de entrada HTTPS de Sofia.
#
#   Cualquier dispositivo de la red
#        │  https://__APP_DOMAIN__   ← cert Let's Encrypt VÁLIDO ⇒ micrófono OK
#        ▼
#   nginx :443 (termina TLS)  →  Next.js 127.0.0.1:3030
#
# El cert lo emite/renueva acme.sh vía DuckDNS (ver deploy/get-cert.sh).
# __APP_DOMAIN__ lo reemplaza deploy/setup.sh con tu dominio real de .env.local.
#
# Instalación (lo hace deploy/setup.sh):
#   sudo cp <generado> /etc/nginx/conf.d/sofia.conf
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → redirige todo a HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name __APP_DOMAIN__;
    return 301 https://$host$request_uri;
}

# HTTPS → reverse proxy a la app.
server {
    # HTTP/2 en la línea listen (compatible con nginx < 1.25.1, donde la
    # directiva "http2 on;" todavía no existe).
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name __APP_DOMAIN__;

    ssl_certificate     /etc/nginx/ssl/sofia/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/sofia/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Subidas de audio del micrófono (transcripción) pueden ser de varios MB.
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;

        # Soporte de WebSocket / streaming.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generar imágenes/música puede tardar; no cortar la conexión antes.
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # No bufferizar para que el audio TTS fluya sin latencia extra.
        proxy_buffering off;
    }
}
